name: Build pv (macOS ARM64) from official source

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout pv source from Andrew Wood's repo
        uses: actions/checkout@v4
        with:
          repository: a-j-wood/pv
          path: pv-src

      - name: Install build dependencies
        run: brew install autoconf automake libtool gettext

      - name: Build pv
        env:
          LDFLAGS: "-L$(brew --prefix gettext)/lib"
          CPPFLAGS: "-I$(brew --prefix gettext)/include"
        run: |
          cd pv-src
          if [ ! -f configure ]; then
            autoreconf -i
          fi
          ./configure --prefix=/usr/local
          make -j$(sysctl -n hw.logicalcpu)

      - name: Prepare artifact
        run: |
          mkdir -p output
          cp pv-src/pv output/

      - name: Upload pv binary
        uses: actions/upload-artifact@v4
        with:
          name: pv-macos-arm64
          path: output/pv
