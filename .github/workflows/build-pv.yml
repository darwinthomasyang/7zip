name: Build pv (macOS ARM64) from official source

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Install build dependencies
        run: brew install gettext

      - name: Download and build pv
        env:
          LDFLAGS: "-L$(brew --prefix gettext)/lib"
          CPPFLAGS: "-I$(brew --prefix gettext)/include"
          PV_VERSION: "1.8.5"               # ← correct stable version
        run: |
          curl -LO https://github.com/a-j-wood/pv/releases/download/v${PV_VERSION}/pv-${PV_VERSION}.tar.gz
          tar xzf pv-${PV_VERSION}.tar.gz
          cd pv-${PV_VERSION}
          ./configure --prefix=/usr/local
          make -j$(sysctl -n hw.logicalcpu)
          mkdir -p ../output
          cp pv ../output/

      - name: Upload pv binary
        uses: actions/upload-artifact@v4
        with:
          name: pv-macos-arm64
          path: output/pv
