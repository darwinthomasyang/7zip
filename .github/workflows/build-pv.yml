name: Build pv (macOS ARM64) from Codeberg

on: [push]                      # 您可改为 workflow_dispatch 等触发方式

jobs:
  build:
    runs-on: macos-latest       # Apple Silicon runner
    steps:
      - name: Install build dependencies
        run: |
          brew install autoconf automake libtool gettext

      - name: Clone pv from Codeberg
        run: |
          git clone https://codeberg.org/a-j-wood/pv.git pv-src
          cd pv-src
          git checkout v1.8.5    # 可选：指定稳定版本标签，不写则用 main 分支

      - name: Build pv
        env:
          LDFLAGS: "-L$(brew --prefix gettext)/lib"
          CPPFLAGS: "-I$(brew --prefix gettext)/include"
        run: |
          cd pv-src
          bash generate.sh
          ./configure --prefix=/usr/local
          make -j$(sysctl -n hw.logicalcpu)
          mkdir -p ../output
          cp pv ../output/

      - name: Upload pv binary
        uses: actions/upload-artifact@v4
        with:
          name: pv-macos-arm64
          path: output/pv
