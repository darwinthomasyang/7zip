name: Build macOS ARM64 and Release
on:
  push:
    tags:
      - 'v*'               # 仅当推送版本标签（如 v1.0）时触发

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write       # 允许创建 Release 并上传 Asset
    steps:
      - uses: actions/checkout@v4

      - name: Compile 7-Zip ARM64
        run: |
          cd CPP/7zip/Bundles/Alone2
          make -j -f ../../cmpl_mac_arm64.mak

      - name: Locate compiled binary
        id: locate
        run: |
          echo "Searching for 7za binary..."
          BINARY=$(find CPP/7zip/Bundles/Alone2 -type f -name '7za' 2>/dev/null | head -1)
          if [ -z "$BINARY" ]; then
            echo "ERROR: 7za binary not found after compilation."
            echo "Listing build tree for debugging:"
            find CPP/7zip/Bundles/Alone2 -type f | head -50
            exit 1
          fi
          echo "Found binary at: $BINARY"
          echo "binary=$BINARY" >> $GITHUB_OUTPUT

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate.outputs.binary }}
          name: "7za-arm64-${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
