name: Build macOS ARM64
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4          # updated from v3
      - name: Compile 7-Zip ARM64
        run: |
          cd CPP/7zip/Bundles/Alone2
          make -j -f ../../cmpl_mac_arm64.mak
      - name: Upload binary
        uses: actions/upload-artifact@v4   # updated from v3 (required fix)
        with:
          name: 7za-arm64
          path: CPP/7zip
